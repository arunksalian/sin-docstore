spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:sinthanai_docstore}
    username: ${DB_USER:docstore}
    password: ${DB_PASSWORD:docstore}
    hikari:
      maximum-pool-size: 20

docstore:
  storage:
    s3:
      endpoint: ${S3_ENDPOINT:http://minio:9000}
      bucket: ${S3_BUCKET:sin-docstore}
      region: ${S3_REGION:us-east-1}
      access-key: ${S3_ACCESS_KEY:minioadmin}
      secret-key: ${S3_SECRET_KEY:minioadmin}

management:
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/traces
