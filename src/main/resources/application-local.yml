spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sinthanai_docstore
    username: docstore
    password: docstore
    hikari:
      maximum-pool-size: 10
  jpa:
    show-sql: false

docstore:
  storage:
    local:
      root-path: /tmp/sin-docstore/blobs

logging:
  level:
    ai.sinthanai: DEBUG
